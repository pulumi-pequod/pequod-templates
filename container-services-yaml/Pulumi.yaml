name: ${PROJECT}
description: ${DESCRIPTION}
runtime: yaml
template:
  description: Pulumi YAML project that deploys an application using the container-services component.
  config:
    aws:region:
      description: The AWS region to deploy into
      default: us-east-2
    cpu:
      description: CPU in vCPUs. See https://docs.aws.amazon.com/AmazonECS/latest/developerguide/task_definition_parameters.html 
      default: 256
    memory:
      description: Memory in MiB
      default: 512

resources:
  dockerImage:
    type: container-services:DockerBuildPush
    properties:
      dockerFilePath: ./app
      destination: aws
  container: 
    type: container-services:ContainerRun
    properties:
      imageReference: ${dockerImage.imageRef}
      cpu: ${cpu}
      memory: ${memory}

outputs:
  imageReference:
    value: ${dockerImage.imageRef}
  serviceUrl:
    value: http://${container.loadbalancerDnsName}

config:
  baseName:
    type: string
    default: ${PULUMI_PROJECT}
  cpu:
    type: integer
    default: 256
  memory:
    type: integer
    default: 512
 

