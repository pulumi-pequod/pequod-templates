name: ${PROJECT}
description: ${DESCRIPTION}
runtime: nodejs
packages:
  containerapps: https://github.com/pulumi-pequod/component-containerapps@v1.3.4
  stackmgmt: https://github.com/pulumi-pequod/component-stackmgmt@v2.3.2
template:
  description: Typescript program that leverages Components to create an Azure Container App and deploys a custom Docker image to it.
  config:
    azure-native:location:
      description: The Azure region to deploy into
      default: CentralUS
    insightsSku:
      description: Operational Insights SKU (e.g. Free, Standard, Premisum, PerNode, PerGB2018)
      default: PerGB2018
    appIngressPort:
      description: Inbound TCP port for the container app.
      default: "80"
    platform:
      description: OS/architecture for the container app.
      default: linux/amd64
