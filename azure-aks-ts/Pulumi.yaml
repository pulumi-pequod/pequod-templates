name: ${PROJECT}
runtime: nodejs
packages:
  stackmgmt: https://github.com/pulumi-pequod/component-stackmgmt@v2.1.0
  k8sdatadog: https://github.com/pulumi-pequod/component-k8sdatadog
description: ${DESCRIPTION}
template:
  description: Azure AKS with Datadog Monitoring  
  config:
    azure-native:location: 
      description: The Azure region to deploy into
      default: CentralUS
    adminUserName:
      description: k8s cluster admin username
      default: "k8sadmin"
    nodeCount:
      description: Number of nodes in k8s cluster.
      default: 2
    nodeSize:
      description: Node size for k8s cluster.
      default: "Standard_D2_v2"
    driftManagement:
      description: Set to "Refresh" to periodically refresh state or set to "Correct" to also run an update after refresh.
      default: Correct