name: ${PROJECT}
description: ${DESCRIPTION}
runtime: nodejs
packages:
  container-services: https://github.com/pulumi-pequod/component-container-services@v1.1.0
  stackmgmt: https://github.com/pulumi-pequod/component-stackmgmt@v2.2.1
template:
  description: Pulumi Typescript project that deploys an application using the container-services component.
  config:
    cpu:
      description: CPU in vCPUs. See https://docs.aws.amazon.com/AmazonECS/latest/developerguide/task_definition_parameters.html 
      default: 256
    memory:
      description: Memory in MiB
      default: 512
