name: ${PROJECT}
runtime:
  name: python
  options:
    virtualenv: venv
description: ${DESCRIPTION}
template:
  description: AWS VPC and EKS Deployment with Datadog
  config:
    aws:region:
      description: The AWS region to deploy into
      default: us-east-2
    minClusterSize:
      description: Minimum size (number of nodes) of cluster
      default: 3
    maxClusterSize:
      description: Maximum size (number of nodes) of cluster
      default: 6
    desiredClusterSize:
      description: Desired number of nodes in the cluster
      default: 3
    driftManagement:
      description: Set to "Refresh" to periodically refresh state or set to "Correct" to also run an update after refresh.
      default: Correct
    eksNodeInstanceType:
      description: Instance type to use for worker nodes
      default: t3.medium
    vpcNetworkCidr:
      description: Network CIDR to use for new VPC
      default: 10.0.0.0/16
