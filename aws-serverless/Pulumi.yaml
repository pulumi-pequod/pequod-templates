name: ${PROJECT}
runtime: nodejs
packages:
  stackmgmt: https://github.com/pulumi-pequod/component-stackmgmt@v2.2.1
description: ${DESCRIPTION}
template:
  description: AWS Serverless Application
  config:
    aws:region:
      description: The AWS region to deploy into
      default: us-west-2
    driftManagement:
      description: Set to "Refresh" to periodically refresh state or set to "Correct" to also run an update after refresh.
      default: Correct