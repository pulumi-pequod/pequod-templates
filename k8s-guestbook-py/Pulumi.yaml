name: ${PROJECT}
runtime:
  name: python
  options:
    virtualenv: venv
packages:
  stackmgmt: https://github.com/pulumi-pequod/component-stackmgmt@v1.0.1
  k8sapp: https://github.com/pulumi-pequod/component-k8sapp@v1.0.3
description: ${DESCRIPTION}
template:
  description: K8s application deployed to shared cluster.
  config:
    base_infra_stack_name: 
      description: Name of base k8s infra stack to use in form of "project/stack"
      default: shared-dev-eks/dev 