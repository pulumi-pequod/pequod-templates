name: ${PROJECT}
runtime: nodejs
packages:
  stackmgmt: https://github.com/pulumi-pequod/component-stackmgmt@v2.2.4
description: ${DESCRIPTION}
template:
  description: AWS ALB + ECS Fargate + RDS with Datadog Monitoring
  config:
    aws:region:
      description: The AWS region to deploy into
      default: us-west-2
    dbName:
      description: Backend DB name
      default: backend
    dbUser:
      description: Backend DB user
      default: admin
